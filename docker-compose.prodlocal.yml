services:
  db:
    env_file:
      - .env.prodlocal
    ports: []
    restart: unless-stopped

  redis:
    ports: []
    restart: unless-stopped

  elasticsearch:
    ports: []
    restart: unless-stopped

  web:
    env_file:
      - .env.prodlocal
    ports: []
    restart: unless-stopped

  worker-clean:
    env_file:
      - .env.prodlocal
    restart: unless-stopped

  worker-upload:
    env_file:
      - .env.prodlocal
    restart: unless-stopped

  worker-merge:
    env_file:
      - .env.prodlocal
    restart: unless-stopped

  worker-pipeline:
    env_file:
      - .env.prodlocal
    restart: unless-stopped

  flower:
    env_file:
      - .env.prodlocal
    ports: []
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    depends_on:
      - web
    volumes:
      - ./infra/nginx/prodlocal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
